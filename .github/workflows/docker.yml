name: Docker

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install hadolint
        run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile
        run: hadolint Dockerfile

      - name: Compile Python sources
        run: python -m compileall app

  prepare-tag:
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name || steps.bump.outputs.new_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve existing tag
        id: resolve
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Bump patch tag
        id: bump
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch --tags --force origin
            latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
            latest="${latest:-v0.0.0}"
            version="${latest#v}"
            IFS=. read -r major minor patch <<< "${version}"
            new_tag="v${major}.${minor}.$((patch + 1))"
            echo "Attempt ${attempt}: tagging ${new_tag} (previous: ${latest})"
            if git tag -a "${new_tag}" -m "Release ${new_tag}" && git push origin "refs/tags/${new_tag}"; then
              echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Push failed (tag may already exist); retrying after refetch"
            git tag -d "${new_tag}" 2>/dev/null || true
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Failed to push a unique tag after 3 attempts"
              exit 1
            fi
          done

  build-and-push:
    needs: [lint, prepare-tag]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tag.outputs.tag_name }}
